<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0f0c29">
    <meta name="description" content="Mr Thinuzz API - Advanced Free API Platform">
    <title>Mr Thinuzz API | Dashboard</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           ADVANCED LOADING CARD STYLES
           ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29 0%, #1a1a3e 50%, #0a0a0a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0a0a0a 0%, #0f0c29 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        /* Loading Card */
        .loading-card {
            width: 420px;
            max-width: 90%;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(139, 92, 246, 0.2);
            overflow: hidden;
            animation: cardFloat 2s ease-in-out infinite;
        }
        
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        /* Card Header */
        .loading-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), transparent);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .loading-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }
        
        .loading-logo i {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .loading-status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulseDot 1.5s infinite;
        }
        
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        /* Card Body */
        .loading-card-body {
            padding: 32px 24px;
            text-align: center;
        }
        
        /* Spinner Container */
        .loading-spinner-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
        }
        
        .loading-spinner-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            border-right-color: #ec4899;
            border-radius: 50%;
            animation: spinRing 1s linear infinite;
        }
        
        .loading-spinner-ring-inner {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 70px;
            height: 70px;
            border: 3px solid rgba(6, 182, 212, 0.2);
            border-bottom-color: #06b6d4;
            border-left-color: #06b6d4;
            border-radius: 50%;
            animation: spinRingInner 0.8s linear infinite reverse;
        }
        
        @keyframes spinRing {
            to { transform: rotate(360deg); }
        }
        
        @keyframes spinRingInner {
            to { transform: rotate(-360deg); }
        }
        
        .loading-spinner-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            color: #8b5cf6;
            animation: iconPulse 1s ease-in-out infinite;
        }
        
        @keyframes iconPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        /* Title */
        .loading-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Progress Bar */
        .loading-progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .loading-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899, #06b6d4);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        /* Loading Steps */
        .loading-steps {
            text-align: left;
            margin-bottom: 24px;
        }
        
        .loading-step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .loading-step.active {
            color: #8b5cf6;
        }
        
        .loading-step.completed {
            color: #10b981;
        }
        
        .loading-step i {
            width: 20px;
            text-align: center;
        }
        
        /* Loading Tip */
        .loading-tip {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.7rem;
            color: #a78bfa;
        }
        
        .loading-tip i {
            font-size: 0.8rem;
        }
        
        /* Card Footer */
        .loading-card-footer {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* Mobile Sidebar Toggle Button */
        .mobile-sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            transition: all 0.3s ease;
        }
        
        .mobile-sidebar-toggle:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 576px) {
            .mobile-sidebar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
        
        /* App Container */
        #app {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        #app.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Advanced Loading Card Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-card">
            <div class="loading-card-header">
                <div class="loading-logo">
                    <i class="fas fa-bolt"></i>
                    <span>MR THINUZZ</span>
                </div>
                <div class="loading-status-dot"></div>
            </div>
            
            <div class="loading-card-body">
                <div class="loading-spinner-container">
                    <div class="loading-spinner-ring"></div>
                    <div class="loading-spinner-ring-inner"></div>
                    <div class="loading-spinner-icon">
                        <i class="fas fa-cogs"></i>
                    </div>
                </div>
                
                <h3 class="loading-title">Initializing System</h3>
                
                <div class="loading-progress-container">
                    <div class="loading-progress-bar" id="loadingProgressBar"></div>
                </div>
                
                <div class="loading-steps">
                    <div class="loading-step" id="step1">
                        <i class="fas fa-circle-notch fa-spin"></i>
                        <span>Loading modules...</span>
                    </div>
                    <div class="loading-step" id="step2">
                        <i class="far fa-circle"></i>
                        <span>Connecting to API...</span>
                    </div>
                    <div class="loading-step" id="step3">
                        <i class="far fa-circle"></i>
                        <span>Fetching statistics...</span>
                    </div>
                    <div class="loading-step" id="step4">
                        <i class="far fa-circle"></i>
                        <span>Preparing dashboard...</span>
                    </div>
                </div>
                
                <div class="loading-tip">
                    <i class="fas fa-lightbulb"></i>
                    <span id="loadingTip">Free API • No Rate Limits • Real-time Scraping</span>
                </div>
            </div>
            
            <div class="loading-card-footer">
                <div class="loading-version">v3.0.0</div>
                <div class="loading-author">Mr Thinuzz</div>
            </div>
        </div>
    </div>
    
    <!-- Mobile Sidebar Toggle Button -->
    <button class="mobile-sidebar-toggle" id="mobileSidebarToggle">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Main App Container -->
    <div id="app"></div>
    
    <!-- Main Application Script -->
    <script src="/js/dashboard.js"></script>
</body>
</html>
