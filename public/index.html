<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Marketplace - Login / Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <div id="login-form" class="auth-form active">
                <h2>Welcome Back</h2>
                <div class="alert" id="login-alert"></div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button id="login-btn" class="btn-primary">Login</button>
            </div>

            <div id="register-form" class="auth-form">
                <h2>Create Account</h2>
                <div class="alert" id="register-alert"></div>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="min 6 characters">
                </div>
                <button id="register-btn" class="btn-primary">Register (Get 1000 Coins)</button>
            </div>
        </div>
    </div>
</body>
</html>
